services:
  zorin:
    image: ghcr.io/aigoohabiwuelaamerikah/linux-distro-zorin:latest
    ports:
      - "5901:5901"
      - "6080:6080"
    environment:
      - VNC_PASSWORD=zorin
      - VNC_RESOLUTION=1920x1080
      - TZ=Etc/UTC
    volumes:
      - zorin-home:/home/zorin
      - ./shared:/home/zorin/shared
    restart: unless-stopped
    stdin_open: true
    tty: true

volumes:
  zorin-home:
